<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contoso Task Pane Add-in</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <!-- Template styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-font-m ms-welcome ms-Fabric">
    <header class="ms-welcome__header ms-bgColor-neutralLighter">
        <img width="90" height="90" src="../../assets/10203599.png" alt="Contoso" title="Contoso" />
        <h1 class="ms-font-su">PE Analysis</h1>
    </header>
    <main id="app-body" class="ms-welcome__main" style="display: none;">  
          
          <div id="output" role="log" aria-live="polite"></div>

          <div id="input" style="margin-top:10px;">
            <div class="pdf-upload-row">
              <input
                id="pdf-input"
                type="file"
                name="pdf"
                accept=".pdf,application/pdf"
                class="pdf-input-sr-only"
                aria-label="Choose PDF"
              />
              <label for="pdf-input" class="pdf-choose-pdf-label">
                <span id="pdf-file-label" class="pdf-file-label-text">Choose PDF</span>
              </label>
            </div>
            <input 
              id="user-input" 
              type="text" 
              placeholder="Type your question here"
            />
            
            <button class="ms-Button-label" id="analyzeBtn">Analyze Sheet</button>
            <div id="status" style="margin-bottom:10px; font-family:system-ui; font-size:14px;"></div>
          </div>

        <p><label id="item-subject"></label></p>
    </main>
</body>

</html>
